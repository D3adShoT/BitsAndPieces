<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Option 7: // — double comment slash, ultra-minimal -->
  <defs>
    <filter id="glow7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="48" height="48" rx="10" fill="#0d0d1a"/>
  <!-- Glow layer -->
  <text x="24" y="31" font-family="'SF Mono','Cascadia Code','Fira Code',monospace"
    font-weight="700" font-size="22" text-anchor="middle"
    fill="#863bff" filter="url(#glow7)" opacity="0.6">//</text>
  <!-- Sharp layer -->
  <text x="24" y="31" font-family="'SF Mono','Cascadia Code','Fira Code',monospace"
    font-weight="700" font-size="22" text-anchor="middle" fill="#a066ff">//</text>
  <!-- Subtle tagline underneath -->
  <text x="24" y="41" font-family="'SF Mono','Cascadia Code',monospace"
    font-size="7" text-anchor="middle" fill="#863bff" opacity="0.5">BitCrafts</text>
</svg>
